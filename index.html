    min-height: 100vh;

    align-items: center;

    padding: 2rem 1rem;
  }
  .app {
    max-width: 480px;
    width: 100%;
    background: rgba(255, 250, 246, 0.93);
    backdrop-filter: blur(4px);
    border-radius: 28px;
    padding: 1.75rem 1.5rem 2rem;
    box-shadow: 0 16px 40px rgba(214, 100, 150, 0.22);
    border: 3px dashed #ffb6cf;
    position: relative;
  }
  h1 {
    font-family: 'Caveat', cursive;
    font-size: 40px;
    font-weight: 600;
    text-align: center;
    margin: 0 0 0.1rem;
    color: #d6477e;
  }
  .subtitle {
    text-align: center;
    color: #b97a93;
    font-size: 14px;
    margin: 0 0 1.5rem;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  button {
    background: #fff0f5;
    border: 2px solid #ffc8dd;
    color: #b9527a;
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: #ffe1ec; border-color: #ff9ec0; }
  button:active:not(:disabled) { transform: scale(0.96); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .tab-btn { flex: 1; }
  .tab-btn.active { background: #ff9ec0; border-color: #ff9ec0; color: #fff; }

  video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #countdown {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: 90px;
    color: #fff;
    font-weight: 600;
    display: none;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  #cam-msg {
    position: absolute;
    color: #6b4a5c;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.75);
    border-radius: 12px;
  }
  .cam-controls { display: flex; gap: 8px; margin-top: 12px; }
  .cam-controls button { flex: 1; }
  #shot-count, #upload-count {
    font-size: 13px;
    color: #b97a93;
    text-align: center;
    margin-top: 8px;
  }
  .dropzone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed #ffb6cf;
    border-radius: 20px;
    padding: 2.5rem 1rem;
    cursor: pointer;
    text-align: center;
    background: #fff5f8;
  }
  .dropzone:hover { border-color: #ff9ec0; background: #ffeef3; }
  .dropzone i { font-size: 30px; color: #ff9ec0; }
  .dropzone span { font-size: 14px; color: #b97a93; margin-top: 10px; }
  #strip-section { margin-top: 1.5rem; display: none; }
  .strip-wrap { display: flex; justify-content: center; }
  #strip {
    background: #fff;
    padding: 18px 18px 30px;
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(214, 100, 150, 0.3);
  }
  .strip-shot { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #111; border-radius: 6px; }
  .strip-shot img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(1) contrast(1.15) brightness(0.95); }
  .strip-caption {
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 600;
    color: #d6477e;
    margin: 6px 0 2px;
  }
  .strip-date {
    text-align: center;
    font-family: 'Poppins', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: #b9527a;
    margin: 0;
  }
  .final-controls { display: flex; gap: 8px; margin-top: 1rem; }
  .final-controls button { flex: 1; }
  .filters-row {
    display: flex;
    gap: 6px;
    margin-top: 1.25rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    flex: 1;
    min-width: 90px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .filter-btn.active { background: #ff9ec0; border-color: #ff9ec0; color: #fff; }
  .strip-shot img.f-bw { filter: grayscale(1) contrast(1.15) brightness(0.95); }
  .strip-shot img.f-vintage { filter: sepia(0.45) saturate(1.3) contrast(1.05) brightness(1.02) hue-rotate(-8deg); }
  .strip-shot img.f-glow { filter: brightness(1.12) contrast(0.92) saturate(1.05) blur(0.3px); }
  .strip-shot img.f-normal { filter: none; }
</style>

<body>
<div class="app">
  <h1>Photobooth ♡</h1>
  <p class="subtitle">Four shots, one strip — just like the real thing</p>

  <div class="tabs">
    <button class="tab-btn active" id="tab-cam">Use camera</button>
    <button class="tab-btn" id="tab-upload">Upload photos</button>
  </div>

  <div id="cam-panel">
    <div class="cam-frame">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div id="countdown"></div>
      <p id="cam-msg">Click "start camera" to begin</p>
    </div>
    <div class="cam-controls">
      <button id="start-cam"><i class="ti ti-camera"></i> Start camera</button>
      <button id="capture-btn" disabled><i class="ti ti-player-play"></i> Take 4 photos</button>
    </div>
    <p id="shot-count">0 of 4 captured</p>
  </div>

  <div id="upload-panel" style="display:none">
    <label for="file-input" class="dropzone">
      <i class="ti ti-upload"></i>
      <span>Choose exactly 4 photos for your strip</span>
    </label>
    <input id="file-input" type="file" accept="image/*" multiple style="display:none" />
    <p id="upload-count">0 of 4 selected</p>
  </div>

  <div id="strip-section">
    <div class="strip-wrap">
      <div id="strip"></div>
    </div>
    <div class="filters-row">
      <button class="filter-btn" data-filter="normal">Normal</button>
      <button class="filter-btn active" data-filter="bw">Black &amp; white</button>
      <button class="filter-btn" data-filter="vintage">Vintage</button>
      <button class="filter-btn" data-filter="glow">Soft glow</button>
    </div>
    <div class="final-controls">
      <button id="download-btn"><i class="ti ti-download"></i> Download strip</button>
      <button id="reset-btn"><i class="ti ti-refresh"></i> Start over</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  let stream = null;
  let shots = [];
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const camMsg = document.getElementById('cam-msg');
  const countdownEl = document.getElementById('countdown');
  const startCamBtn = document.getElementById('start-cam');
  const captureBtn = document.getElementById('capture-btn');
  const shotCount = document.getElementById('shot-count');
  const uploadCount = document.getElementById('upload-count');
  const fileInput = document.getElementById('file-input');
  const stripSection = document.getElementById('strip-section');
  const strip = document.getElementById('strip');
  const tabCam = document.getElementById('tab-cam');
  const tabUpload = document.getElementById('tab-upload');
  const camPanel = document.getElementById('cam-panel');
  const uploadPanel = document.getElementById('upload-panel');

  function setTab(which){
    tabCam.classList.toggle('active', which==='cam');
    tabUpload.classList.toggle('active', which==='upload');
    camPanel.style.display = which==='cam' ? 'block' : 'none';
    uploadPanel.style.display = which==='upload' ? 'block' : 'none';
  }
  tabCam.onclick = () => setTab('cam');
  tabUpload.onclick = () => setTab('upload');

  startCamBtn.onclick = async () => {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      video.srcObject = stream;
      camMsg.style.display = 'none';
      captureBtn.disabled = false;
      startCamBtn.disabled = true;
    } catch(e) {
      camMsg.textContent = "Couldn't access camera. Try the upload option instead.";
    }
  };

  function snap(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0);
    return canvas.toDataURL('image/jpeg', 0.92);
  }

  function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

  captureBtn.onclick = async () => {
    shots = [];
    captureBtn.disabled = true;
    startCamBtn.disabled = true;
    for (let i=0;i<4;i++){
      for (let c=3;c>0;c--){
        countdownEl.textContent = c;
        countdownEl.style.display = 'flex';
        await wait(700);
      }
      countdownEl.style.display = 'none';
      shots.push(snap());
      shotCount.textContent = shots.length + ' of 4 captured';
      await wait(300);
    }
    buildStrip(shots);
    captureBtn.disabled = false;
  };

  fileInput.onchange = (e) => {
    const files = Array.from(e.target.files).slice(0,4);
    uploadCount.textContent = files.length + ' of 4 selected';
    if (files.length < 4) return;
    const readers = files.map(f => new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(f);
    }));
    Promise.all(readers).then(buildStrip);
  };

  let currentFilter = 'bw';
  let currentImages = [];

  function todayLabel(){
    const d = new Date();
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function buildStrip(images){
    currentImages = images;
    renderStrip();
    stripSection.style.display = 'block';
    stripSection.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  function renderStrip(){
    strip.innerHTML = '';
    currentImages.forEach(src => {
      const wrap = document.createElement('div');
      wrap.className = 'strip-shot';
      const img = document.createElement('img');
      img.src = src;
      img.className = 'f-' + currentFilter;
      wrap.appendChild(img);
      strip.appendChild(wrap);
    });
    const caption = document.createElement('p');
    caption.className = 'strip-caption';
    caption.textContent = 'photobooth ♡';
    strip.appendChild(caption);
    const dateLine = document.createElement('p');
    dateLine.className = 'strip-date';
    dateLine.textContent = todayLabel();
    strip.appendChild(dateLine);
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderStrip();
    });
  });

  document.getElementById('download-btn').onclick = () => {
    html2canvas(strip, {backgroundColor:'#ffffff', scale:3}).then(c => {
      const link = document.createElement('a');
      link.download = 'photo-strip.png';
      link.href = c.toDataURL('image/png');
      link.click();
    });
  };

  document.getElementById('reset-btn').onclick = () => {
    shots = [];
    shotCount.textContent = '0 of 4 captured';
    uploadCount.textContent = '0 of 4 selected';
    fileInput.value = '';
    stripSection.style.display = 'none';
    if (stream){
      stream.getTracks().forEach(t=>t.stop());
      stream = null;
      startCamBtn.disabled = false;
      captureBtn.disabled = true;
      camMsg.style.display = 'block';
      camMsg.textContent = 'Click "start camera" to begin';
    }
  };
})();
</script>
</body>
</html>
